<!-- Links: Checkbox + Buttons -->
<div class="flex items-center gap-3">
    <!-- Sync Button -->
    <button 
        id="sync-btn" 
        hx-post="/home?account_id={{ selected_account_id }}&folder_id={{ selected_folder_id }}&page={{ page }}"
        hx-target="#mail-list"
        hx-swap="innerHTML"
        class="flex items-center gap-1.5 px-3 py-1 rounded-md bg-white/10 text-neutral-400 hover:bg-white/15 hover:text-white text-sm transition-colors"
    >
        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
        <span>Sync</span>
    </button>
</div>

<!-- PAGE NAVIGATOR -->
<div class="flex items-center gap-2 text-sm text-neutral-400">
    <span id="total_mails">{{ (page - 1) * page_size + 1 }}-{{ [page * page_size, total_mails] | min }} of {{ total_mails }}</span>
    <button 
        class="p-1 rounded hover:bg-white/10 transition-colors"
        hx-get="/home?account_id={{ selected_account_id }}&folder_id={{ selected_folder_id }}&page=1"
        hx-target="#mail-list"
    >
        <i data-lucide="chevron-first" class="w-4 h-4"></i>
    </button>
    <button 
        class="p-1 rounded hover:bg-white/10 transition-colors"
        hx-get="/home?account_id={{ selected_account_id }}&folder_id={{ selected_folder_id }}&page={{ page - 1 if page > 1 else page}}"
        hx-target="#mail-list"
    >
        <i data-lucide="chevron-left" class="w-4 h-4"></i>
    </button>
    <button 
        class="p-1 rounded hover:bg-white/10 transition-colors"
        hx-get="/home?account_id={{ selected_account_id }}&folder_id={{ selected_folder_id }}&page={{ page + 1 if page < total_pages else page}}"
        hx-target="#mail-list"
    >
        <i data-lucide="chevron-right" class="w-4 h-4"></i>
    </button>
    <button 
        class="p-1 rounded hover:bg-white/10 transition-colors"
        hx-get="/home?account_id={{ selected_account_id }}&folder_id={{ selected_folder_id }}&page={{ total_pages }}"
        hx-target="#mail-list"
    >
        <i data-lucide="chevron-last" class="w-4 h-4"></i>
    </button>
</div>
