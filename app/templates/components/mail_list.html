{% for mail in mails %}
<div hx-get="/mail/{{ mail.id }}/content"
     hx-target="#mail-detail"
     class="group flex items-center gap-3 px-4 py-3 border-b border-white/5 hover:bg-white/5 cursor-pointer transition-colors">
    <div>
        <span>Running Badge</span>
    </div>

    <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between gap-2">
            <span class="text-sm text-white truncate">{{ mail.subject }}</span>
            <span class="text-xs text-neutral-500 shrink-0">{{ mail.date }}</span>
        </div>
        <div class="flex items-center justify-between gap-2">
            <span class="text-xs text-neutral-500 truncate block">{{ mail.sender }}</span>
            {% if mail.occurrence_files|length > 0 %}
                <i data-lucide="paperclip" class="w-3.5 h-3.5 text-neutral-500 shrink-0"></i>
            {% endif %}
        </div>
    </div>
</div>
{% endfor %}
