{% extends 'mail_viewer.html' %}

{% block head %}
    {{ super() }}
    <title>MailAccounts</title>
{% endblock %}

{% block mail_accounts %}
<div class="w-1/6 bg-black/70 border border-white/40 p-3 rounded-xl space-y-1 text-sm overflow-y-auto max-w-52 overflow-x-scroll">

    <!-- Account 1 -->
    <details class="group" open>
        <summary class="flex items-center gap-2 cursor-pointer px-2 py-1.5 rounded-lg hover:bg-white/10 transition">
            <i data-lucide="chevron-right" class="w-4 h-4 text-white/50 transition-transform group-open:rotate-90"></i>
            <i data-lucide="mail" class="w-4 h-4 text-rose-500"></i>
            <span class="text-white truncate">alice@example.com</span>
        </summary>

        <div class="ml-4 border-l border-white/10 pl-2 space-y-0.5 mt-1">
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="inbox" class="w-4 h-4 text-rose-400"></i>
                <span class="truncate">Inbox</span>
                <span class="ml-auto bg-rose-500 text-white text-xs font-bold px-1.5 py-0.5 rounded-full">3</span>
            </a>
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="file-edit" class="w-4 h-4 text-white/40"></i>
                <span class="truncate">Drafts</span>
            </a>
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="send" class="w-4 h-4 text-white/40"></i>
                <span class="truncate">Sent</span>
            </a>
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="alert-octagon" class="w-4 h-4 text-white/40"></i>
                <span class="truncate">Spam</span>
            </a>
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="trash-2" class="w-4 h-4 text-white/40"></i>
                <span class="truncate">Deleted</span>
            </a>
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="archive" class="w-4 h-4 text-white/40"></i>
                <span class="truncate">Archive</span>
            </a>
        </div>
    </details>

    <!-- Account 2 -->
    <details class="group">
        <summary class="flex items-center gap-2 cursor-pointer px-2 py-1.5 rounded-lg hover:bg-white/10 transition">
            <i data-lucide="chevron-right" class="w-4 h-4 text-white/50 transition-transform group-open:rotate-90"></i>
            <i data-lucide="mail" class="w-4 h-4 text-rose-500"></i>
            <span class="text-white truncate">bob@example.org</span>
        </summary>

        <div class="ml-4 border-l border-white/10 pl-2 space-y-0.5 mt-1">
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="inbox" class="w-4 h-4 text-rose-400"></i>
                <span class="truncate">Inbox</span>
            </a>
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="file-edit" class="w-4 h-4 text-white/40"></i>
                <span class="truncate">Entwürfe</span>
            </a>
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="send" class="w-4 h-4 text-white/40"></i>
                <span class="truncate">Gesendet</span>
            </a>
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="mail-search" class="w-4 h-4 text-white/40"></i>
                <span class="truncate">All Mail</span>
            </a>
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="alert-octagon" class="w-4 h-4 text-white/40"></i>
                <span class="truncate">Spam</span>
                <span class="ml-auto bg-rose-500 text-white text-xs font-bold px-1.5 py-0.5 rounded-full">8</span>
            </a>
            <a href="#" class="flex items-center gap-2 px-2 py-1 rounded-md hover:bg-white/10 transition text-white/80 hover:text-white">
                <i data-lucide="trash-2" class="w-4 h-4 text-white/40"></i>
                <span class="truncate">Papierkorb</span>
            </a>
        </div>
    </details>
</div>
{% endblock %}
