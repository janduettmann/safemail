
<!--
    hidden: Standardmaessig versteckt, wird via JS eingeblendet
    h-1: Sehr duenne Leiste
-->
{% if is_visible %}
<div 
    id="scan-statusbar"
    hx-get="/scan/status"
    hx-target="this"
    hx-trigger="every 0.5s"
    hx-swap="outerHTML"
    class="shrink-0"
>
    <div id="scan-status" class="flex items-center gap-2 px-4 py-1.5 bg-[#1a1a1a] border-b border-white/10 absolute top-0 left-0 right-0 z-10">
        <svg id="scan-spinner"
            hx-preserve="true"
            xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="w-3.5 h-3.5 text-rose-400 animate-spin">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        <span class="text-xs text-neutral-400">Scanning {{ scan_completed }}/{{ scan_total }} Mails...</span>
        <!-- Fortschrittsbalken -->
        <div class="flex-1 bg-white/10 h-0.5">
        {% if scan_total != 0 %}
            <div id="scan-progress" class="bg-gradient-to-r from-rose-500 to-pink-600 h-0.5 transition-all duration-300" style="width: {{ ((scan_completed/scan_total) * 100) | int }}%"></div>
        {% endif %}
        </div>
    </div>
</div>
{% else %}
<div id="scan-statusbar" class="absolute top-0 left-0 right-0 z-10"></div>
{% endif %}
