<dialog id="dialog" aria-labelledby="dialog-title" class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-black/80">

    <div tabindex="0" class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center sm:p-0">
        <div class="relative transform overflow-hidden rounded-lg text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg bg-gray-800 outline -outline-offset-1 outline-white/10">
            <form method="POST" action="{{ url_for('app_account.delete_account') }}">
                <div class="px-4 pt-5 pb-4 sm:p-6 sm:pb-4 bg-[#1a1a1a]">
                    <div class="sm:flex sm:items-start">
                        <div class="mx-auto flex size-12 shrink-0 items-center justify-center rounded-full sm:mx-0 sm:size-10 bg-red-500/10">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="size-6 text-red-400">
                                <path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </div>
                        <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
                            <h3 id="dialog-title" class="text-base font-semibold text-white">Delete account</h3>
                            <div class="mt-2">
                                <p class="text-sm text-neutral-400">Are you sure you want to delete your account? All of your data will be permanently removed. This action cannot be undone.</p>
                            </div>
                            <div class="mb-2.5 mt-5">
                                <label class="block text-xs text-white font-semibold mb-1.5">Type in `delete` to confirm</label>
                                <input name="delete_confirmation" type="text" class="w-full px-3 py-1.5 bg-[#212121] border border-white/10 rounded-md text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-red-500/80 focus:ring-2 focus:ring-rose-500/40 transition-colors">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6 bg-[#212121]">
                    <button type="submit" class="inline-flex w-full justify-center rounded-md px-3 py-2 text-sm font-semibold text-white sm:ml-3 sm:w-auto bg-red-500 shadow-none hover:bg-red-400">Delete Account</button>
                    <button type="button" onclick="document.getElementById('dialog').close()" class="mt-3 inline-flex w-full justify-center rounded-md px-3 py-2 text-sm font-semibold inset-ring  sm:mt-0 sm:w-auto bg-white/10 text-white shadow-none inset-ring-white/5 hover:bg-white/20">Cancel</button>
                </div>
            </form>
        </div>
    </div>  
</dialog>
